name: build-staging
on:
  pull_request:
    types: [labeled]
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write   # required to push images to GHCR

env:
  GO_VERSION: "1.24"
  DOCKER_BASE_IMAGE: debian:bookworm-slim
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.label.name, 'staging:') || github.event.ref == 'refs/heads/main' }}
    outputs:
      version: ${{ steps.build-info.outputs.version }}
      deployment: ${{ steps.build-info.outputs.deployment }}
      debian_sha: ${{ steps.debian.outputs.sha }}
      owner_lc: ${{ steps.owner.outputs.lc }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: build-info
        id: build-info
        run: |
          staging_label="${{ github.event.label.name }}"
          if [[ "${staging_label}" == "staging:"* ]]; then
              deployment="${staging_label#staging:}"
          elif [[ "${{ github.event.ref }}" == "refs/heads/main" ]]; then
              deployment="staging"
          else
              echo "error: not able to determine deployment. Please make sure the workflow is triggered by a PR labeled with 'staging:<deployment>' or by a push to 'main'"
              exit 1
          fi

          # Compute a version derived from git: <latest-tag>-<commits-ahead>-<sha>
          # Falls back to the short sha when no tag is reachable.
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            version="$(git describe --tags --always --dirty)"
          else
            version="$(git rev-parse --short HEAD)"
          fi

          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "deployment=${deployment}" >> $GITHUB_OUTPUT
      - name: owner-lowercase
        id: owner
        run: |
          # GHCR requires the repository owner segment to be lowercase.
          echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT
      - name: resolve-debian-sha
        id: debian
        run: |
          sha=$(docker buildx imagetools inspect "${DOCKER_BASE_IMAGE}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"' | sed 's/^sha256://')
          echo "sha=${sha}" >> $GITHUB_OUTPUT

  signoz-otel-collector:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: build-binaries
        run: |
          mkdir -p target/linux-amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -o target/linux-amd64/signoz-otel-collector ./cmd/signozotelcollector
      - uses: docker/setup-buildx-action@v3
      - name: ghcr-login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./cmd/signozotelcollector/Dockerfile.multi-arch
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lc }}/signoz-otel-collector:staging-${{ needs.prepare.outputs.version }}
          # APT_MIRROR override: Dockerfile.multi-arch defaults to
          # mirrors.aliyun.com for in-region builds. GitHub-hosted runners
          # are outside CN, so route apt back through deb.debian.org here.
          build-args: |
            DEBIAN_SHA=${{ needs.prepare.outputs.debian_sha }}
            OS=linux
            APT_MIRROR=deb.debian.org

  # NOTE: the original pipeline also triggered a downstream `releaser` event in
  # `charts-saas-v3-staging` via signoz/primus.workflows. That step required
  # the SigNoz GitHub App tokens which are not available outside SigNoz, so it
  # has been intentionally omitted in this fork. Re-add it here if you set up
  # equivalent credentials.
