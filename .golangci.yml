# Minimal golangci-lint v2 config used by `make lint` and CI.
#
# Philosophy: this is a large fork of SigNoz' otel-collector. We want lint
# to catch *real* issues we introduce, not flag every legacy pattern in
# upstream code. So we keep the high-signal linters (govet, staticcheck,
# ineffassign, unused, gosimple — all in `standard`) and explicitly drop
# the two that produce dozens of false positives on the upstream codebase:
#   - errcheck: unchecked defer Close() everywhere
#   - gosec:    int->uint conversions, md5 hashes for non-crypto IDs, etc.
# Re-enable them per-package once the offending code has been cleaned up.
version: "2"

run:
  timeout: 10m
  tests: true
  allow-parallel-runners: true

linters:
  default: standard
  disable:
    - errcheck
  enable:
    - misspell
    - unconvert
    - unparam
  exclusions:
    rules:
      # Generated and vendored code is out of our control.
      - path: ".*generated.*\\.go$"
        linters:
          - unparam
          - unconvert
      - path: "_test\\.go$"
        linters: []

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
